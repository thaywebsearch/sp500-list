<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TESTE — Tabela</title>

<style>
table {
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
}
th {
    background: #f2f2f2;
    padding: 10px;
    border-bottom: 2px solid #ccc;
}
td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>Teste de Tabela</h1>

<table>
<thead>
<tr>
    <th>Symbol</th>
    <th>Security</th>
</tr>
</thead>

<tbody>
<tr>
    <td>MMM</td>
    <td>3M Company</td>
</tr>

<tr>
    <td>AAPL</td>
    <td>Apple Inc.</td>
</tr>
</tbody>

</table>

</body>
</html>
