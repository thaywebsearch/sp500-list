name: Update S&P 500 Table

on:
  schedule:
    - cron: "0 0 * * 1"  # Toda segunda-feira à meia-noite
  workflow_dispatch:      # Permite correr manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas tabulate

      - name: Run update script
        run: python update_sp500.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sp500-table/
          git diff --staged --quiet || git commit -m "Update S&P 500 table"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
