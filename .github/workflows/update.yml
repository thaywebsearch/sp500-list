name: Update S&P 500 Table

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas beautifulsoup4 lxml requests

      - name: Run update script
        run: python update_sp500.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sp500-table/sp500-table.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update S&P 500 table [skip ci]" && git push)

     
 
