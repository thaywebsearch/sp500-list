name: Update S&P 500 Table (Improved)

on:
  workflow_dispatch: # Permite execução manual
  schedule:
    - cron: "0 6 * * *" # Todos os dias às 06:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Concede permissão de escrita para o GITHUB_TOKEN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pandas beautifulsoup4 lxml requests

      - name: Run update script
        run: python update_sp500.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sp500-table/sp500-table.md # Adiciona explicitamente o ficheiro a ser atualizado
          git commit -m "Auto-update S&P 500 table" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Garante que o token é usado para autenticação

   
